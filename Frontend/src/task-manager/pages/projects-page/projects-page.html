<main class="flex-1 flex flex-col overflow-hidden">

  <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 space-y-8 ">
    <!-- Favorites / Highlights -->
    <section>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">


        @if (projectResource.isLoading()) {
        <p>Cargando proyectos...</p>
        }


        @for (project of projectResource.value(); track project.id) {
        <project-card [project]="project"></project-card>
        }@empty {
        <p>No hay proyectos...</p>
        }



        @if (authservice.user()?.role === 'ADMIN') {


        <div (click)="openCreateProject()" (projectCreated)="projectResource.reload()"
          class="bg-white/40 dark:bg-stone-900/40 rounded-xl border-2 border-dashed border-slate-200
          dark:border-stone-800 flex flex-col items-center justify-center p-8 group hover:border-primary/50
          transition-all cursor-pointer">
        
        </div>
        }
      </div>
    </section>
  </div>
</main>
